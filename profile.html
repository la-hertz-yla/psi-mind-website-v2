<link rel="stylesheet" href="profile.css">

</head>

<body>

  <nav>
    <div class="logo">PSI-MIND</div>
    <ul>
      <li><a href="index.html#accueil">Accueil</a></li>
      <li><a href="index.html#apropos">A propos</a></li>
      <li><a href="index.html#cours">Cours Intégral</a></li>
      <li><a href="index.html#contact">Contact</a></li>

    <div class="mobile-menu">
      <ul>
        <li><a href="#accueil">Accueil</a></li>

        <li><a href="#cours">Cours Intégral</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </div>
    <i id="menu-toggle" class="fa-solid fa-bars"></i>
  </nav>

  <div class="theme-toggle-bar">
    <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">
      <i class="fa-solid fa-sun" id="theme-toggle-icon"></i>
    </button>
  </div>

<section class="profile-page">

    <div class="profile-card">
        <h2>Mon Profil</h2>

        <div class="avatar">
            <i class="fa-solid fa-user-graduate"></i>
        </div>

        <div class="field">
            <label>Nom complet</label>
            <input type="text" id="full_name">
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="field">
            <label>Filière</label>
            <input type="text" id="filiere">
        </div>

        <div class="field">
            <label>Prépa</label>
            <input type="text" id="prepa_name">
        </div>

        <div class="field">
            <label>Téléphone</label>
            <input type="text" id="phone">
        </div>

        <button id="saveProfile">Sauvegarder</button>
    </div>


    <div class="favorites-card">
        <h2>Mes Favoris</h2>
        <div id="favoritesList"></div>
    </div>

</section>

<footer>

</footer>
